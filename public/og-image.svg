<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc"/>
      <stop offset="100%" style="stop-color:#e2e8f0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Brand icon -->
  <rect x="500" y="100" width="80" height="80" rx="16" fill="#2563eb"/>
  <text x="540" y="152" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="700" fill="white" text-anchor="middle">MD</text>

  <!-- Logo text -->
  <text x="600" y="152" font-family="system-ui, -apple-system, sans-serif" font-size="40" font-weight="700" fill="#1e293b" text-anchor="start" dx="10">markdownmyfile.com</text>

  <!-- Tagline -->
  <text x="600" y="250" font-family="system-ui, -apple-system, sans-serif" font-size="52" font-weight="800" fill="#0f172a" text-anchor="middle">Convert any document to Markdown</text>

  <!-- Subtitle -->
  <text x="600" y="310" font-family="system-ui, -apple-system, sans-serif" font-size="28" fill="#64748b" text-anchor="middle">Free · No sign-up · Runs in your browser</text>

  <!-- Format pills -->
  <rect x="140" y="380" width="110" height="44" rx="22" fill="#dbeafe" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="195" y="408" font-family="system-ui, sans-serif" font-size="20" font-weight="600" fill="#2563eb" text-anchor="middle">.docx</text>

  <rect x="270" y="380" width="100" height="44" rx="22" fill="#dbeafe" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="320" y="408" font-family="system-ui, sans-serif" font-size="20" font-weight="600" fill="#2563eb" text-anchor="middle">.pdf</text>

  <rect x="390" y="380" width="100" height="44" rx="22" fill="#dbeafe" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="440" y="408" font-family="system-ui, sans-serif" font-size="20" font-weight="600" fill="#2563eb" text-anchor="middle">.xlsx</text>

  <rect x="510" y="380" width="110" height="44" rx="22" fill="#dbeafe" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="565" y="408" font-family="system-ui, sans-serif" font-size="20" font-weight="600" fill="#2563eb" text-anchor="middle">.pptx</text>

  <rect x="640" y="380" width="110" height="44" rx="22" fill="#dbeafe" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="695" y="408" font-family="system-ui, sans-serif" font-size="20" font-weight="600" fill="#2563eb" text-anchor="middle">.html</text>

  <rect x="770" y="380" width="90" height="44" rx="22" fill="#dbeafe" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="815" y="408" font-family="system-ui, sans-serif" font-size="20" font-weight="600" fill="#2563eb" text-anchor="middle">.rtf</text>

  <rect x="880" y="380" width="90" height="44" rx="22" fill="#dbeafe" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="925" y="408" font-family="system-ui, sans-serif" font-size="20" font-weight="600" fill="#2563eb" text-anchor="middle">.csv</text>

  <!-- Arrow -->
  <text x="600" y="490" font-family="system-ui, sans-serif" font-size="36" fill="#94a3b8" text-anchor="middle">↓</text>

  <!-- Output -->
  <rect x="470" y="510" width="260" height="54" rx="27" fill="#2563eb"/>
  <text x="600" y="545" font-family="system-ui, sans-serif" font-size="24" font-weight="700" fill="white" text-anchor="middle">Clean Markdown</text>
</svg>
